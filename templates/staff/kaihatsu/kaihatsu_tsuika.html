<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇図書館-書籍情報追加フォーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<header>
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header border-bottom border-2 border-success" style="width: 100%;">
          <a class="navbar-brand" href="{{url_for('staff')}}">〇〇図書館</a>
        </div>
      </div>
    </nav>
</header>

<body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

    <h4>追加</h4>
    <form method = "post" action = "{{url_for('tsuika_kakunin')}}" >
        <div class="form-group">
            <div class="mt-3"><label for="name">本の名前:</label></div>
            <input type="text" id="name change" name="name" required>
        </div>
        <div class="form-group">
            <div class="mt-3"><label for="author">著者名:</label></div>
            <input type="text" id="author change" name="author" required>
        </div>
        <div class="form-group">
            <div class="mt-3"><label for="publisher">出版社:</label></div>
            <input type="text" id="publisher change" name="publisher" required>            
        </div>
        <div class="form-group">
            <div class="mt-3"><label for="isbn">ISBN:</label></div>
            <input type="text" name="isbn" id="isbn change" required>
        </div>
        <div class="form-group">
            <button type="button" class="btn btn-primary mt-3" id="submitBtn" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                追加
            </button>
        </div>
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">確認</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div>
            <!-- 追加しますか？ -->
            書名:<p id="f_name">書名</p>
            著者:<p id="f_author">著者</p>
            出版社:<p id="f_publisher">出版社</p>
            ISBN:<p id="f_isbn">ISBN</p>
        </div>
    </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取り消し</button>
        <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">追加</button>
      </div>
    </div>
  </div>
</div>

    </form>
    {%if flg == 1%}
        <div class="alert alert-danger">
            <p>すでにある本です</p>
        </div>
    {%endif%}

<script>

    function c_p(){
        const name = document.getElementById('name change');
        document.getElementById('f_name').textContent = name.value;
    
        const author = document.getElementById('author change'); 
        document.getElementById('f_author').textContent = author.value;

        const publisher = document.getElementById('publisher change');
        document.getElementById('f_publisher').textContent = publisher.value;

        const isbn = document.getElementById('isbn change');
        document.getElementById('f_isbn').textContent = isbn.value;

    }

    // const x = document.getElementById("submitBtn");
    // console.log(x)


    document.getElementById("submitBtn").addEventListener("click", function () {
        console.log("ok");
        c_p();
    }); 

    
</script>
</body>
</html>
