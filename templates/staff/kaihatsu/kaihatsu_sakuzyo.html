<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇図書館-書籍情報削除フォーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<header>
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header border-bottom border-2 border-success" style="width: 100%;">
          <a class="navbar-brand" href="{{url_for('staff')}}">〇〇図書館</a>
        </div>
      </div>
    </nav>
</header>

<body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

    <h4>削除</h4>
    <form method = "post" action = "{{url_for('sakuzyo_kakunin')}}">
        <p>
            <p>ISBN:</p>
            <input type="text" name="isbn" required>
        </p>
        <p>
            <button type="button" class="btn btn-primary mt-3" id="submitBtn" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                削除
            </button>
        </p>
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">確認</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div>
            削除しますか？
            <!-- 書名:<p id="f_name">書名</p>
            著者:<p id="f_author">著者</p>
            出版社:<p id="f_publisher">出版社</p>
            ISBN:<p id="f_isbn">ISBN</p> -->
        </div>
    </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取り消し</button>
        <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">削除</button>
      </div>
    </div>
  </div>
</div>

    </form>
        {% if erflg == 0 %}
          <div class="alert alert-danger">
            {{ msg }}
          </div>
        {% endif %}

    
</body>
</html>
