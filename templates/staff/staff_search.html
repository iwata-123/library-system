<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇図書館-検索ホーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<header>
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header border-bottom border-2 border-success" style="width: 100%;">
          <a class="navbar-brand" href="{{url_for('staff')}}">〇〇図書館</a>
        </div>
      </div>
    </nav>
</header>

<body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

    <h3>検索</h1>
    <form method = "post" action = "{{url_for('staff_search_result')}}">
        <div class="form-group">
            <div>ID:</div>
            <input type="text" name="id">
        </div>
        <div class="form-group">
            <div>本の名前:</div>
            <input type="text" name="name">
        </div>
        <div class="form-group">
            <div>著者名:</div>
            <input type="text" name="author">
        </div>
        <div class="form-group">
            <div>出版社:</div>
            <input type="text" name="publisher">            
        </div>
        <div class="form-group">
            <div>ISBN:</div>
            <input type="text" name="isbn">
        </div>
        <div class="form-group">
            <div>貸出</div>
            <div>
                <input type="radio" id="kka" name="kashidashi" value="1">
                <label for="kka">貸出可</label>
            </div>
            <div>
                <input type="radio" id="khuka" name="kashidashi" value="0">
                <label for="khuka">貸出不可</label>
            </div>
        </div>
        <div class="form-group">
            <div>禁書</div>
            <div>
                <input type="radio" id="kinka" name="kinsho" value="1">
                <label for="kinka">禁書</label>
            </div>
            <div>
                <input type="radio" id="kinhuka" name="kinsho" value="0">
                <label for="kinhuka">禁書じゃない</label>
            </div>
        </div>
        <div class="form-group">
            <div>予約</div>
            <div>
                <input type="radio" id="yka" name="yoyaku" value="1">
                <label for="yka">予約可</label>
            </div>
            <div>
                <input type="radio" id="yhuka" name="yoyaku" value="0">
                <label for="yhuka">予約不可</label>
            </div>
        </div>

        <div>
            <a href="{{url_for('staff_search_result')}}"><input type="submit" value="検索"></a>
        </div>
    </form>
</body>
</html>
