<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇図書館-検索結果</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<header>
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header border-bottom border-2 border-success" style="width: 100%;">
          <a class="navbar-brand" href="{{url_for('user')}}">〇〇図書館</a>
        </div>
      </div>
    </nav>
</header>

<body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

    <h1>検索結果</h1>
    {% if rows == None %}
    {% else %}
            <div class="table-responsive">
                <table class="table table-hover">
                    <tr>
                        <td>
                            <div class="d-inline-flex p-2 text-center">題名</div>
                        </td>
                        <td>
                            <div class="d-inline-flex p-2 text-center">著者名</div>
                        </td>
                        <td>
                            <div class="d-inline-flex p-2 text-center">出版社</div>
                        </td>
                        <td>
                            <div class="d-inline-flex p-2 text-center">ISBN</div>
                        </td>
                        <td>
                            <div class="d-inline-flex p-2 text-center">貸出状態</div>
                        </td>
                        <td>
                            <div class="d-inline-flex p-2 text-center">予約待ち件数</div>
                        </td>
                    </tr>
        {%for row in rows%}
                        {%set btitle = row[1]%}
                            <tr>
                                <td>
                                    <div class="d-inline-flex p-2 text-center"><a href="{{url_for('base',btitle = row[0])}}">{{row[0]}}</a></div>
                                </td>
                                <td>
                                    <div class="d-inline-flex p-2 text-center">{{row[1]}}</div>
                                </td>
                                <td>
                                    <div class="d-inline-flex p-2 text-center">{{row[2]}}</div>
                                </td>
                                <td>
                                    <div class="d-inline-flex p-2 text-center">{{row[3]}}</div>
                                </td>
                                <td>
                                    {%if row[4] == 1%}
                                        <div class="d-inline-flex p-2 text-center">貸出不可</div>
                                    {%elif row[4] == 0%}
                                        <div class="d-inline-flex p-2 text-center">貸出可</div>
                                    {% endif %}

                                </td>
                                <td>
                                    <div class="d-inline-flex p-2 text-center">{{row[5]}}</div>
                                </td>
                            </tr>
        {%endfor%}
    {% endif %}
                </table>
            </div>
</body>
</html>
